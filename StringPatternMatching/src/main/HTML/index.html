<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSM Visualizer</title>
    <script type="text/javascript" src="../../../target/scala-3.3.4/stringpatternmatching-fastopt.js"></script>
    <style>
        #fsm-graph {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 20px;
          margin: 20px;
          padding: 10px;
          background-color: #f0f0f0;
          border: 1px solid #ccc;
        }

        .state {
          padding: 20px;
          border: 2px solid black;
          border-radius: 10px;
          text-align: center;
          background-color: white;
          position: relative;
        }

        .state.end-state {
          background-color: lightgreen;
        }

        .transition {
          color: blue;
          font-size: 12px;
          margin-top: 10px;
        }
    </style>

</head>
<body>
<h1>Finite State Machine Visualization</h1>
</body>
</html>
